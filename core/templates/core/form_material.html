{% extends 'core/base.html' %}
{% block content %}

<div style="max-width:500px; margin:0 auto;">
    <h2>{% if editando %}Editar Material{% else %}Nuevo Material{% endif %}</h2>

    <form method="post" enctype="multipart/form-data" style="margin-top:20px;">
        {% csrf_token %}

        {% for field in form %}
        <div style="margin-bottom:16px;">
            <label style="display:block; font-weight:500; margin-bottom:4px;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div style="color:red; font-size:13px; margin-top:4px;">{{ field.errors }}</div>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display:flex; gap:10px; margin-top:24px;">
            <button type="submit" class="btn btn-primary">
                {% if editando %}Guardar cambios{% else %}Agregar material{% endif %}
            </button>
            <a href="{% url 'catalogo_materiales' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
