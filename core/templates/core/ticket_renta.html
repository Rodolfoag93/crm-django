{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticket Renta {{ renta.folio }}</title>

    <style>
        @page {
            size: 80mm auto;
            margin: 0;
        }

        body {
            width: 62mm;
            max-width: 62mm;
            font-family: Courier, monospace;
            font-size: 10.5px;
            margin: 0;
            padding: 2mm;
        }

        h2, h3 {
            text-align: center;
            margin: 4px 0;
        }

        h2 { font-size: 13px; }
        h3 { font-size: 10px; }

        p {
            margin: 3px 0;
        }

        hr {
            border: none;
            border-top: 1px dashed #444;
            margin: 6px 0;
        }

        .totales {
            text-align: right;
            font-weight: bold;
        }

        .logo {
            display: block;
            margin: 0 auto 5px auto;
            height: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 6px;
            table-layout: fixed;
        }

        th, td {
  		padding: 2px 0;
  		border-bottom: 1px dotted #444;
  		font-size: 9.5px;
		}	

        th {
            font-weight: bold;
            font-size: 9.5px;
        }

        /* Anchos exactos para 80mm */
        th:nth-child(1), td:nth-child(1) { width: 38%; text-align: left; }
        th:nth-child(2), td:nth-child(2) { width: 12%; text-align: center; }
        th:nth-child(3), td:nth-child(3) { width: 20%; text-align: right; }
        th:nth-child(4), td:nth-child(4) { width: 30%; text-align: right; }

        table, tr, td {
            page-break-inside: avoid;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
        }

	/* Forzar fin de página (ayuda al corte) */
	.cut {
    		page-break-after: always;
		}
	</style>

          
</head>



<body>
{% include "partial/ticket_base.html" with tipo="cliente" %}
<div class="cut"></div>
{% include "partial/ticket_base.html" with tipo="admin" %}
</body>
</html>
