{% extends 'core/base.html' %}
{% block content %}

<h2 style="text-align:center;">📊 Administración</h2>
<hr>

<div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

    <a href="{% url 'pedidos_semana' %}" class="admin-card">Contabilidad</a>
    <a href="{% url 'lista_empleados' %}" class="admin-card">Empleados</a>
    <a href="{% url 'lista_nomina' %}" class="admin-card">Nómina</a>
    <a href="{% url 'lista_gastos' %}" class="admin-card">Gastos</a>
    <a href="{% url 'lista_compras' %}" class="admin-card">Compras</a>
    <a href="{% url 'lista_cuentas' %}" class="admin-card">Cuentas bancarias</a>

    <a href="{% url 'todas_listas_material' %}" class="admin-card admin-card--material">
        📋 Listas de material
    </a>

    <!-- 🔥 NUEVO: FINANZAS -->
    <a href="{% url 'balance_cuentas' %}" class="admin-card finanzas">
        💰 Finanzas
    </a>

    <a href="{% url 'productos_mas_rentados' %}"
       style="padding:15px 25px;
              background:#ff9800;
              color:white;
              border-radius:10px;
              font-weight:bold;
              text-decoration:none;">
        📈 Productos más rentados
    </a>

</div>

<style>
.admin-card{
    width:200px;
    padding:25px;
    background:#9C27B0;
    color:white;
    border-radius:10px;
    text-align:center;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
.admin-card:hover{
    background:#7B1FA2;
}

/* Diferenciar Finanzas visualmente */
.admin-card.finanzas{
    background:#2E7D32;
}
.admin-card.finanzas:hover{
    background:#1B5E20;
}

.admin-card--material{
    background:#00695c;
}
.admin-card--material:hover{
    background:#004d40;
}
</style>

{% endblock %}
